# SPDX-License-Identifier: 0BSD

name: DragonFly BSD

on:
  push:
    branches: [ master, ci_run ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  DragonflyBSD:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    name: DragonFly BSD
    steps:
      - uses: actions/checkout@v6

      - name: Test in DragonFly BSD
        id: test
        uses: vmactions/dragonflybsd-vm@323497fa680c1856dd1ba5c4fd89182a9194f649 #v1.2.7
        with:
          usesh: true
          prepare: >
            pkg install -y
            autoconf
            automake
            gettext-tools
            libtool
            m4
          run: |
            set -e
            uname -a
            ./autogen.sh --no-po4a
            # Innocent putc() triggers strict-overflow warnings.
            ./configure --disable-static --enable-debug --enable-werror CFLAGS='-g -O2 -pipe -Wno-error=strict-overflow'
            make -j4 check
