# SPDX-License-Identifier: 0BSD

name: NetBSD

on:
  push:
    branches: [ master, ci_run ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  NetBSD:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    name: NetBSD
    steps:
      - uses: actions/checkout@v6

      - name: Test in NetBSD
        id: test
        uses: vmactions/netbsd-vm@ca7ff0556959998c82761c34ea0c3c99fa084c48 #v1.3.7
        with:
          usesh: true
          prepare: >
            /usr/sbin/pkg_add -v
            cmake
            gettext-tools
            ninja-build
            po4a
          run: |
            set -e
            uname -a
            ./po4a/update-po
            # Innocent putc() triggers strict-overflow warnings.
            cmake -G Ninja -B build -DBUILD_SHARED_LIBS=ON -DCMAKE_C_FLAGS='-UNDEBUG -g -O2 -pipe -Wno-error=strict-overflow' -DCMAKE_COMPILE_WARNING_AS_ERROR=ON
            ninja -C build
            ctest --test-dir build --output-on-failure
